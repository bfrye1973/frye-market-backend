name: dashboard-archive-30m

on:
  workflow_dispatch: {}
  schedule:
    # every 30 minutes, Monday-Friday
    - cron: "*/30 * * * 1-5"

jobs:
  archive:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: dashboard-archive-30m
      cancel-in-progress: false
    permissions:
      contents: write

    env:
      LIVE_BRANCH: data-live-30m
      ARCHIVE_BRANCH: data-archive-30m

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch latest 30m payload (live branch → /tmp)
        run: |
          set -e
          mkdir -p /tmp/live30
          curl -sSL "https://raw.githubusercontent.com/bfrye1973/frye-market-backend/${LIVE_BRANCH}/data/outlook_30m.json" \
            -o /tmp/live30/outlook_30m.json
          test -s /tmp/live30/outlook_30m.json

      - name: Prepare archive branch (clean working tree)
        run: |
          set -e
          git fetch origin "${ARCHIVE_BRANCH}" || true
          if git ls-remote --exit-code --heads origin "${ARCHIVE_BRANCH}" >/dev/null 2>&1; then
            git checkout -B "${ARCHIVE_BRANCH}" "origin/${ARCHIVE_BRANCH}"
          else
            git checkout --orphan "${ARCHIVE_BRANCH}"
            rm -rf *
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          mkdir -p data/archive/30m/dashboard

      - name: Stamp snapshot and commit
        env:
          GIT_AUTHOR_NAME: "frye-bot"
          GIT_AUTHOR_EMAIL: "bot@users.noreply.github.com"
          GIT_COMMITTER_NAME: "frye-bot"
          GIT_COMMITTER_EMAIL: "bot@users.noreply.github.com"
        run: |
          set -e
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          cp -f /tmp/live30/outlook_30m.json "data/archive/30m/dashboard/outlook_30m_${TS}.json"
          git add "data/archive/30m/dashboard/outlook_30m_${TS}.json"
          git commit -m "Archive snapshot 30m @ ${TS}" || echo "nothing to commit"
          git push origin "${ARCHIVE_BRANCH}"
